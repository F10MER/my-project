<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tiny Todo | Hermes Workflow Sandbox</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app">
      <p class="label">Hermes workflow sandbox demo</p>
      <h1>Tiny Todo</h1>
      <p class="intro">
        A small dependency-free example for testing a scoped implementation
        handoff in this public sandbox repository.
      </p>

      <section class="todo-panel" aria-labelledby="todo-title">
        <div class="panel-heading">
          <h2 id="todo-title">Tasks</h2>
          <p id="task-count" class="task-count" aria-live="polite">0 tasks</p>
        </div>

        <form id="todo-form" class="todo-form">
          <label class="visually-hidden" for="todo-input">New task</label>
          <input
            id="todo-input"
            name="task"
            type="text"
            maxlength="120"
            placeholder="Add a task"
            autocomplete="off"
            required
          >
          <button type="submit">Add</button>
        </form>

        <p id="empty-state" class="empty-state">No tasks yet. Add one above.</p>
        <ul id="todo-list" class="todo-list" aria-label="Todo items"></ul>
      </section>
    </main>
  </body>
</html>
